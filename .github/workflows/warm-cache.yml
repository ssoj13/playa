name: Warm Cache

on:
  push:
    tags:
      - 'v*'  # only on release-like tags
  workflow_dispatch:
    inputs:
      backends:
        description: 'Which backends to warm (openexr|exrs|both)'
        required: false
        default: 'openexr'

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  check-branch:
    runs-on: ubuntu-latest
    outputs:
      on-main: ${{ steps.check.outputs.on-main }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if tag is on main branch
        id: check
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin +refs/heads/*:refs/remotes/origin/*
          TAG_SHA="${GITHUB_SHA}"
          if git rev-parse --verify origin/main >/dev/null 2>&1; then
            if git merge-base --is-ancestor "$TAG_SHA" origin/main; then
              echo "on-main=true" >> "$GITHUB_OUTPUT"
            else
              echo "on-main=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "on-main=false" >> "$GITHUB_OUTPUT"
          fi

  warm:
    needs: [check-branch, decide]
    if: (needs.check-branch.outputs.on-main == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name == 'workflow_dispatch' || needs.decide.outputs.should_run == 'true')
    strategy:
      matrix:
        include:
          - platform: windows
            runner: windows-latest
          - platform: linux
            runner: ubuntu-latest
          - platform: macos
            runner: macos-latest
    uses: ./.github/workflows/_build-platform.yml
    with:
      runner: ${{ matrix.runner }}
      platform: ${{ matrix.platform }}
      branch_condition: 'true'
      should_release: false
      cache_only: true
      backends: ${{ github.event_name == 'workflow_dispatch' && inputs.backends || 'openexr' }}
    secrets: inherit

  decide:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check recent successful Warm Cache run (12h threshold)
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.info('Manual run detected: skipping cooldown check.');
              core.setOutput('should_run', 'true');
              return;
            }
            const THRESHOLD_MS = 12 * 60 * 60 * 1000; // 12 hours
            const { owner, repo } = context.repo;
            const workflow_id = 'warm-cache.yml';
            const res = await github.rest.actions.listWorkflowRuns({ owner, repo, workflow_id, status: 'success', per_page: 1 });
            const runs = res.data.workflow_runs || [];
            if (runs.length === 0) {
              core.setOutput('should_run', 'true');
              return;
            }
            const latest = runs[0];
            const updated = new Date(latest.updated_at).getTime();
            const ageMs = Date.now() - updated;
            const ageMin = (ageMs / 60000).toFixed(1);
            core.info(`Latest Warm Cache success: ${ageMin} minutes ago (threshold 12h)`);
            core.setOutput('should_run', ageMs > THRESHOLD_MS ? 'true' : 'false');
