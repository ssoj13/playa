  build-macos-exrs:
    runs-on: macos-latest
    needs: check-branch
    if: needs.check-branch.outputs.on-main == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: brew install cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-10-15

      - name: Restore cargo and build artifacts cache
        id: cache-macos
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            ~/.cargo/bin/
            target/
          key: playa-macos-v1

      - name: Install cargo-packager
        run: cargo packager --version || cargo install cargo-packager --version 0.11.7 --locked

      - name: Import Code Signing Certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Disable history expansion to handle special characters in password
          set +H

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12

          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Allow codesign to use the key without prompting
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Verify certificate is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "Certificate imported successfully"

      - name: Fetch dependencies
        run: cargo fetch

      - name: Clean old installers and DMG artifacts
        run: |
          # Unmount any mounted DMG volumes
          hdiutil detach /Volumes/Playa 2>/dev/null || true

          # Remove old DMG files
          rm -f target/release/*.dmg

          # Remove cargo-packager temporary directories
          rm -rf target/release/.cargo-packager/dmg
          rm -rf ~/Library/Caches/.cargo-packager/DMG

      - name: Build the application (exrs backend)
        run: cargo xtask build

      - name: Package the application
        run: cargo packager --release

      - name: Rename DMG to include backend
        run: |
          # Rename DMG
          dmg=$(find target/release -maxdepth 1 -name "*.dmg" 2>/dev/null | head -n 1)
          if [ -n "$dmg" ]; then
            newname=$(echo "$dmg" | sed "s/\(playa[_-][0-9.]\+\)/\1-exrs/")
            mv "$dmg" "$newname"
            echo "Renamed DMG: $(basename $dmg) -> $(basename $newname)"
          fi

      - name: Find DMG
        id: find_dmg
        run: |
          # Prefer top-level target/release output from cargo-packager
          dmg=$(find target/release -maxdepth 1 -name "*.dmg" 2>/dev/null | head -n 1)
          # Fallback to legacy bundle path if needed
          if [ -z "$dmg" ]; then
            dmg=$(find target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -n 1)
          fi
          if [ -n "$dmg" ]; then
            echo "path=$dmg" >> $GITHUB_OUTPUT
            echo "Found DMG: $dmg"
          else
            echo "No DMG found"
          fi

      - name: Create binstall ZIP
        run: |
          # Create directory for binstall package
          mkdir -p binstall

          # Copy binary
          cp target/release/playa binstall/

          # Copy all .dylib files (including symlinks)
          cp -P target/release/lib*.dylib binstall/ 2>/dev/null || true

          # Create zip with rust target name for cargo-binstall (preserve symlinks)
          cd binstall
          zip -ry ../target/release/playa-exrs-aarch64-apple-darwin.zip *
          cd ..

          echo "Created binstall ZIP: playa-exrs-aarch64-apple-darwin.zip"
          echo "Contents:"
          ls -lh binstall/

      - name: Upload macOS DMG artifact
        if: steps.find_dmg.outputs.path != ''
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg-exrs
          path: ${{ steps.find_dmg.outputs.path }}
          retention-days: 7
          if-no-files-found: error

      - name: Upload macOS binstall artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-binstall-exrs
          path: target/release/playa-exrs-aarch64-apple-darwin.zip
          retention-days: 7
          if-no-files-found: error

      - name: Save cargo and build artifacts cache
        if: needs.check-branch.outputs.on-main == 'true' && steps.cache-macos.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            ~/.cargo/bin/
            target/
          key: playa-macos-v1

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.find_dmg.outputs.path }}
            target/release/playa-exrs-aarch64-apple-darwin.zip
          fail_on_unmatched_files: false

  build-macos-openexr:
    runs-on: macos-latest
    needs: [check-branch, build-macos-exrs]
    if: needs.check-branch.outputs.on-main == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: brew install cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-10-15

      - name: Restore cargo and build artifacts cache
        id: cache-macos
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            ~/.cargo/bin/
            target/
          key: playa-macos-v1

      - name: Install cargo-packager
        run: cargo packager --version || cargo install cargo-packager --version 0.11.7 --locked

      - name: Import Code Signing Certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Disable history expansion to handle special characters in password
          set +H

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12

          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          # Allow codesign to use the key without prompting
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Verify certificate is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "Certificate imported successfully"

      - name: Fetch dependencies
        run: cargo fetch

      - name: Clean previous backend binaries
        run: |
          rm -f target/release/playa
          rm -f target/release/lib*.dylib

      - name: Clean old installers and DMG artifacts
        run: |
          # Unmount any mounted DMG volumes
          hdiutil detach /Volumes/Playa 2>/dev/null || true

          # Remove old DMG files
          rm -f target/release/*.dmg

          # Remove cargo-packager temporary directories
          rm -rf target/release/.cargo-packager/dmg
          rm -rf ~/Library/Caches/.cargo-packager/DMG

      - name: Build the application (openexr backend)
        run: cargo xtask build --openexr

      - name: Package the application
        run: cargo packager --release

      - name: Rename DMG to include backend
        run: |
          # Rename DMG
          dmg=$(find target/release -maxdepth 1 -name "*.dmg" 2>/dev/null | head -n 1)
          if [ -n "$dmg" ]; then
            newname=$(echo "$dmg" | sed "s/\(playa[_-][0-9.]\+\)/\1-openexr/")
            mv "$dmg" "$newname"
            echo "Renamed DMG: $(basename $dmg) -> $(basename $newname)"
          fi

      - name: Find DMG
        id: find_dmg
        run: |
          # Prefer top-level target/release output from cargo-packager
          dmg=$(find target/release -maxdepth 1 -name "*.dmg" 2>/dev/null | head -n 1)
          # Fallback to legacy bundle path if needed
          if [ -z "$dmg" ]; then
            dmg=$(find target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -n 1)
          fi
          if [ -n "$dmg" ]; then
            echo "path=$dmg" >> $GITHUB_OUTPUT
            echo "Found DMG: $dmg"
          else
            echo "No DMG found"
          fi

      - name: Create binstall ZIP
        run: |
          # Create directory for binstall package
          mkdir -p binstall

          # Copy binary
          cp target/release/playa binstall/

          # Copy all .dylib files (including symlinks)
          cp -P target/release/lib*.dylib binstall/ 2>/dev/null || true

          # Create zip with rust target name for cargo-binstall (preserve symlinks)
          cd binstall
          zip -ry ../target/release/playa-openexr-aarch64-apple-darwin.zip *
          cd ..

          echo "Created binstall ZIP: playa-openexr-aarch64-apple-darwin.zip"
          echo "Contents:"
          ls -lh binstall/

      - name: Upload macOS DMG artifact
        if: steps.find_dmg.outputs.path != ''
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg-openexr
          path: ${{ steps.find_dmg.outputs.path }}
          retention-days: 7
          if-no-files-found: error

      - name: Upload macOS binstall artifact
        uses: actions/upload-artifact@v5
        with:
          name: macos-binstall-openexr
          path: target/release/playa-openexr-aarch64-apple-darwin.zip
          retention-days: 7
          if-no-files-found: error

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.find_dmg.outputs.path }}
            target/release/playa-openexr-aarch64-apple-darwin.zip
          fail_on_unmatched_files: false
