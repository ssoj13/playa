name: Release

on:
  push:
    tags:
      - 'v*'  # Only build on version tags (v0.1.26, etc.)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Required for creating releases and uploading artifacts

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # Check if the tag is on main branch (we only want release builds here)
  check-branch:
    runs-on: ubuntu-latest
    outputs:
      on-main: ${{ steps.check.outputs.on-main }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history to check branches

      - name: Check if tag is on main branch
        id: check
        run: |
          set -euo pipefail
          # Ensure remote branches are present (tags push may not fetch branches by default)
          git fetch --no-tags origin +refs/heads/*:refs/remotes/origin/*
          TAG_SHA="${GITHUB_SHA}"
          if git rev-parse --verify origin/main >/dev/null 2>&1; then
            if git merge-base --is-ancestor "$TAG_SHA" origin/main; then
              echo "on-main=true" >> $GITHUB_OUTPUT
              echo "✓ Tag commit is contained in origin/main - proceeding with release"
            else
              echo "on-main=false" >> $GITHUB_OUTPUT
              echo "✗ Tag commit is NOT contained in origin/main - skipping release"
            fi
          else
            echo "on-main=false" >> $GITHUB_OUTPUT
            echo "✗ origin/main not found after fetch - skipping release"
          fi

  build-windows:
    needs: check-branch
    if: needs.check-branch.outputs.on-main == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-platform.yml
    with:
      runner: windows-latest
      platform: windows
      branch_condition: ${{ needs.check-branch.outputs.on-main }}
      should_release: true
    secrets: inherit

  build-linux:
    needs: check-branch
    if: needs.check-branch.outputs.on-main == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-platform.yml
    with:
      runner: ubuntu-latest
      platform: linux
      branch_condition: ${{ needs.check-branch.outputs.on-main }}
      should_release: true
    secrets: inherit

  build-macos:
    needs: check-branch
    if: needs.check-branch.outputs.on-main == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-platform.yml
    with:
      runner: macos-latest
      platform: macos
      branch_condition: ${{ needs.check-branch.outputs.on-main }}
      should_release: true
    secrets: inherit
