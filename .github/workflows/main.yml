name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v0.4.7, v1.0.0, etc.
  workflow_dispatch:  # Allow manual trigger

# Only run release builds for tags on main branch
# This prevents dev branch tags from creating releases

permissions:
  contents: write  # Required for creating releases and uploading artifacts

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # Check if the tag is on main branch before building
  check-branch:
    runs-on: ubuntu-latest
    outputs:
      on-main: ${{ steps.check.outputs.on-main }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Fetch all history to check branches

      - name: Check if tag is on main branch
        id: check
        run: |
          # Check if the current tag is reachable from main branch
          if git merge-base --is-ancestor HEAD origin/main 2>/dev/null; then
            echo "on-main=true" >> $GITHUB_OUTPUT
            echo "✓ Tag is on main branch - proceeding with release"
          else
            echo "on-main=false" >> $GITHUB_OUTPUT
            echo "✗ Tag is NOT on main branch - skipping release"
          fi

  build-windows-exrs:
    runs-on: windows-latest
    needs: check-branch
    if: needs.check-branch.outputs.on-main == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-10-15

      - name: Restore cargo and build artifacts cache
        id: cache-windows
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            ~/.cargo/bin/
            target/
          key: playa-windows-v1

      - name: Fetch dependencies
        run: cargo fetch

      - name: Clean old installers
        run: |
          # Remove old installer artifacts from cache to prevent version mismatch
          # Keep playa.exe binary, only remove installer packages
          Remove-Item target/release/playa_*-setup.* -ErrorAction SilentlyContinue
          Remove-Item target/release/*.msi -ErrorAction SilentlyContinue

      - name: Install cargo-packager
        run: |
          if (!(Get-Command cargo-packager -ErrorAction SilentlyContinue)) {
            cargo install cargo-packager --version 0.11.7 --locked
          } else {
            Write-Host "cargo-packager already installed"
          }

      - name: Build the application (exrs backend)
        run: cargo xtask build

      - name: Package the application
        run: cargo packager --release

      - name: Rename installer to include backend
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "target/release" -Filter "playa_*-setup.*" | Select-Object -First 1
          if ($installer) {
            $newName = $installer.Name -replace '(playa_[\d\.\-]+)', "`$1-exrs"
            Rename-Item -Path $installer.FullName -NewName $newName
            Write-Host "Renamed $($installer.Name) to $newName"
          }

      - name: Find installer
        id: find_installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "target/release" -Filter "playa_*-setup.*" | Select-Object -First 1
          if ($installer) {
            $relativePath = "target/release/$($installer.Name)"
            echo "path=$relativePath" >> $env:GITHUB_OUTPUT
            echo "Found installer: $($installer.FullName)"
            echo "Using relative path: $relativePath"
          } else {
            echo "Installer not found in target/release"
            exit 1
          }

      - name: Create binstall ZIP
        shell: pwsh
        run: |
          # Create directory for binstall package
          New-Item -ItemType Directory -Force -Path "binstall" | Out-Null

          # Copy exe
          Copy-Item "target/release/playa.exe" -Destination "binstall/"

          # Copy all dll files
          Get-ChildItem -Path "target/release" -Filter "*.dll" | Copy-Item -Destination "binstall/"

          # Create zip with rust target name for cargo-binstall
          $zipName = "playa-exrs-x86_64-pc-windows-msvc.zip"
          Compress-Archive -Path "binstall/*" -DestinationPath "target/release/$zipName" -Force

          echo "Created binstall ZIP: $zipName"
          echo "Contents:"
          Get-ChildItem "binstall" | Format-Table Name, Length

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: windows-exrs
          path: |
            ${{ steps.find_installer.outputs.path }}
            target/release/playa-exrs-x86_64-pc-windows-msvc.zip
          if-no-files-found: warn
          retention-days: 7

      - name: Save cargo and build artifacts cache
        if: needs.check-branch.outputs.on-main == 'true' && steps.cache-windows.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            ~/.cargo/bin/
            target/
          key: playa-windows-v1

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.find_installer.outputs.path }}
            target/release/playa-exrs-x86_64-pc-windows-msvc.zip
          fail_on_unmatched_files: false

  build-windows-openexr:
    runs-on: windows-latest
    needs: [check-branch, build-windows-exrs]
    if: needs.check-branch.outputs.on-main == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-10-15

      - name: Restore cargo and build artifacts cache
        id: cache-windows
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            ~/.cargo/bin/
            target/
          key: playa-windows-v1

      - name: Fetch dependencies
        run: cargo fetch

      - name: Clean previous backend binaries
        run: |
          Remove-Item target/release/playa.exe -ErrorAction SilentlyContinue
          Remove-Item target/release/*.dll -ErrorAction SilentlyContinue

      - name: Clean old installers
        run: |
          # Remove old installer artifacts from cache to prevent version mismatch
          # Keep playa.exe binary, only remove installer packages
