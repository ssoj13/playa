      - name: Install cargo-packager
        run: |
          if (!(Get-Command cargo-packager -ErrorAction SilentlyContinue)) {
            cargo install cargo-packager --version 0.11.7 --locked
          } else {
            Write-Host "cargo-packager already installed"
          }

      - name: Build the application (openexr backend)
        run: cargo xtask build --openexr

      - name: Package the application
        run: cargo packager --release

      - name: Rename installer to include backend
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "target/release" -Filter "playa_*-setup.*" | Select-Object -First 1
          if ($installer) {
            $newName = $installer.Name -replace '(playa_[\d\.\-]+)', "`$1-openexr"
            Rename-Item -Path $installer.FullName -NewName $newName
            Write-Host "Renamed $($installer.Name) to $newName"
          }

      - name: Find installer
        id: find_installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "target/release" -Filter "playa_*-setup.*" | Select-Object -First 1
          if ($installer) {
            $relativePath = "target/release/$($installer.Name)"
            echo "path=$relativePath" >> $env:GITHUB_OUTPUT
            echo "Found installer: $($installer.FullName)"
            echo "Using relative path: $relativePath"
          } else {
            echo "Installer not found in target/release"
            exit 1
          }

      - name: Create binstall ZIP
        shell: pwsh
        run: |
          # Create directory for binstall package
          New-Item -ItemType Directory -Force -Path "binstall" | Out-Null

          # Copy exe
          Copy-Item "target/release/playa.exe" -Destination "binstall/"

          # Copy all dll files
          Get-ChildItem -Path "target/release" -Filter "*.dll" | Copy-Item -Destination "binstall/"

          # Create zip with rust target name for cargo-binstall
          $zipName = "playa-openexr-x86_64-pc-windows-msvc.zip"
          Compress-Archive -Path "binstall/*" -DestinationPath "target/release/$zipName" -Force

          echo "Created binstall ZIP: $zipName"
          echo "Contents:"
          Get-ChildItem "binstall" | Format-Table Name, Length

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: windows-openexr
          path: |
            ${{ steps.find_installer.outputs.path }}
            target/release/playa-openexr-x86_64-pc-windows-msvc.zip
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.find_installer.outputs.path }}
            target/release/playa-openexr-x86_64-pc-windows-msvc.zip
          fail_on_unmatched_files: false

  build-linux-exrs:
    runs-on: ubuntu-latest
    needs: check-branch
    if: needs.check-branch.outputs.on-main == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libspeechd-dev libxkbcommon-dev libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-10-15

      - name: Restore cargo and build artifacts cache
        id: cache-linux
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            ~/.cargo/bin/
            target/
          key: playa-linux-v1

      - name: Install cargo-packager
        run: cargo packager --version || cargo install cargo-packager --version 0.11.7 --locked

      - name: Fetch dependencies
        run: cargo fetch

      - name: Clean old installers
        run: |
          # Remove old installer artifacts from cache to prevent version mismatch
          rm -f target/release/*.AppImage target/release/*.deb

      - name: Build the application (exrs backend)
        run: cargo xtask build

      - name: Package the application
        run: |
          export LD_LIBRARY_PATH="$(pwd)/target/release:$LD_LIBRARY_PATH"
          cargo packager --release

      - name: Rename installers to include backend
        run: |
          # Rename AppImage
          appimage=$(find target/release -maxdepth 1 \( -name "*.AppImage" -o -name "*.appimage" \) 2>/dev/null | head -n 1)
          if [ -n "$appimage" ]; then
            newname=$(echo "$appimage" | sed "s/\(playa[_-][0-9.]\+\)/\1-exrs/")
            mv "$appimage" "$newname"
            echo "Renamed AppImage: $(basename $appimage) -> $(basename $newname)"
          fi

          # Rename DEB
          deb=$(find target/release -maxdepth 1 -name "*.deb" 2>/dev/null | head -n 1)
          if [ -n "$deb" ]; then
            newname=$(echo "$deb" | sed "s/\(playa[_-][0-9.]\+\)/\1-exrs/")
            mv "$deb" "$newname"
            echo "Renamed DEB: $(basename $deb) -> $(basename $newname)"
          fi

      - name: List bundle contents (if successful)
        run: |
          if [ -d "target/release/bundle" ]; then
            ls -R target/release/bundle/
          else
            echo "Bundle directory not found - build likely failed"
            exit 0
          fi

      - name: Find AppImage
        id: find_appimage
        run: |
          # Prefer top-level target/release output from cargo-packager
          appimage=$(find target/release -maxdepth 1 \( -name "*.AppImage" -o -name "*.appimage" \) 2>/dev/null | head -n 1)
          # Fallback to legacy bundle path if needed
          if [ -z "$appimage" ]; then
            appimage=$(find target/release/bundle/appimage -name "*.AppImage" 2>/dev/null | head -n 1)
          fi
          if [ -n "$appimage" ]; then
            echo "path=$appimage" >> $GITHUB_OUTPUT
            echo "Found AppImage: $appimage"
          else
            echo "No AppImage found"
          fi

      - name: Find DEB
        id: find_deb
        run: |
          # Prefer top-level target/release output from cargo-packager
          deb=$(find target/release -maxdepth 1 -name "*.deb" 2>/dev/null | head -n 1)
          # Fallback to legacy bundle path if needed
          if [ -z "$deb" ]; then
            deb=$(find target/release/bundle/deb -name "*.deb" 2>/dev/null | head -n 1)
          fi
          if [ -n "$deb" ]; then
            echo "path=$deb" >> $GITHUB_OUTPUT
            echo "Found DEB: $deb"
          else
            echo "No DEB found"
          fi

      - name: Create binstall ZIP
        run: |
          # Create directory for binstall package
          mkdir -p binstall

          # Copy binary
          cp target/release/playa binstall/

          # Copy all .so files (including symlinks)
          cp -P target/release/*.so* binstall/ 2>/dev/null || true

          # Create zip with rust target name for cargo-binstall (preserve symlinks)
          cd binstall
          zip -ry ../target/release/playa-exrs-x86_64-unknown-linux-gnu.zip *
          cd ..

          echo "Created binstall ZIP: playa-exrs-x86_64-unknown-linux-gnu.zip"
          echo "Contents:"
          ls -lh binstall/

      - name: Upload Linux AppImage artifact
        if: steps.find_appimage.outputs.path != ''
        uses: actions/upload-artifact@v5
        with:
          name: linux-appimage-exrs
          path: ${{ steps.find_appimage.outputs.path }}
          retention-days: 7
          if-no-files-found: error

      - name: Upload Linux DEB artifact
        if: steps.find_deb.outputs.path != ''
        uses: actions/upload-artifact@v5
        with:
          name: linux-deb-exrs
          path: ${{ steps.find_deb.outputs.path }}
          retention-days: 7
          if-no-files-found: error

      - name: Upload Linux binstall artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-binstall-exrs
          path: target/release/playa-exrs-x86_64-unknown-linux-gnu.zip
          retention-days: 7
          if-no-files-found: error

      - name: Save cargo and build artifacts cache
        if: needs.check-branch.outputs.on-main == 'true' && steps.cache-linux.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            ~/.cargo/bin/
            target/
          key: playa-linux-v1

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.find_appimage.outputs.path }}
            ${{ steps.find_deb.outputs.path }}
            target/release/playa-exrs-x86_64-unknown-linux-gnu.zip
          fail_on_unmatched_files: false

