name: Build

on:
  push:
    tags:
      - 'v*'  # Only build on version tags (v0.1.26, etc.)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read  # No write needed for dev builds

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # Check if the tag is NOT on main branch (we only want dev builds here)
  check-branch:
    runs-on: ubuntu-latest
    outputs:
      not-on-main: ${{ steps.check.outputs.not-on-main }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history to check branches

      - name: Check if tag is NOT on main branch
        id: check
        run: |
          # Check if the current tag is reachable from main branch
          if git merge-base --is-ancestor HEAD origin/main 2>/dev/null; then
            echo "not-on-main=false" >> $GITHUB_OUTPUT
            echo "✗ Tag is on main branch - skipping dev build"
          else
            echo "not-on-main=true" >> $GITHUB_OUTPUT
            echo "✓ Tag is NOT on main branch - proceeding with dev build"
          fi

  build-windows:
    needs: check-branch
    if: needs.check-branch.outputs.not-on-main == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-platform.yml
    with:
      runner: windows-latest
      platform: windows
      branch_condition: ${{ needs.check-branch.outputs.not-on-main }}
      should_release: false
    secrets: inherit

  build-linux:
    needs: check-branch
    if: needs.check-branch.outputs.not-on-main == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-platform.yml
    with:
      runner: ubuntu-latest
      platform: linux
      branch_condition: ${{ needs.check-branch.outputs.not-on-main }}
      should_release: false
    secrets: inherit

  build-macos:
    needs: check-branch
    if: needs.check-branch.outputs.not-on-main == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_build-platform.yml
    with:
      runner: macos-latest
      platform: macos
      branch_condition: ${{ needs.check-branch.outputs.not-on-main }}
      should_release: false
    secrets: inherit
